name: Build Windows App

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: x86_64-pc-windows-msvc
          override: true

      - name: Build Windows client
        working-directory: windows
        run: cargo build --release

      - name: List release directory contents
        run: |
          echo "Contents of windows/target/release:"
          dir windows\target\release
          echo "Contents of target/release (if any):"
          dir target\release 2>nul || echo "No target\release folder"
          echo "Searching for any .exe files in the whole project:"
          dir /s /b *.exe

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: iranvpn-windows-x64
          path: '**/*.exe'
