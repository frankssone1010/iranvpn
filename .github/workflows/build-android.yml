name: Build Android APK

on: [workflow_dispatch]  # Allows you to manually trigger the build

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17' # As recommended by the android/README.md

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platforms;android-35 build-tools;35.0.0 ndk;25.1.8937393" # Adjust NDK version if needed

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          target: aarch64-linux-android, armv7-linux-androideabi, i686-linux-android, x86_64-linux-android
          override: true

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Build Rust Core
        run: ./scripts/build-android-core.sh
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/25.1.8937393 # Match NDK version from setup step

      - name: Fetch tun2socks prebuilts
        run: ./scripts/fetch-tun2socks-prebuilt.sh

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: cd android && ./gradlew assembleDebug

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iranvpn-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
