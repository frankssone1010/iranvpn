name: Build Android APK

on: [workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK and NDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platforms;android-35 build-tools;35.0.0 ndk;25.1.8937393"

      - name: Setup Rust and Android Targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, i686-linux-android, x86_64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Fix NDK environment variables
        run: |
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/25.1.8937393" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.1.8937393" >> $GITHUB_ENV

      - name: Build Rust Core (with debug)
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/25.1.8937393
          ANDROID_NDK_ROOT: ${{ env.ANDROID_HOME }}/ndk/25.1.8937393
        run: |
          chmod +x ./scripts/build-android-core.sh
          # Show the script content for debugging
          echo "=== Content of build-android-core.sh ==="
          cat ./scripts/build-android-core.sh
          echo "========================================"
          # Run with bash -x to see each command
          bash -x ./scripts/build-android-core.sh 2>&1 | tee rust-build.log
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "Rust build failed. Last 50 lines:"
            tail -50 rust-build.log
            exit 1
          fi

      - name: Fetch tun2socks prebuilts
        run: |
          chmod +x ./scripts/fetch-tun2socks-prebuilt.sh
          ./scripts/fetch-tun2socks-prebuilt.sh

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: cd android && ./gradlew assembleDebug

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: iranvpn-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
